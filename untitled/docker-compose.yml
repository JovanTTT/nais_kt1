version: '3.8'

services:
  # InfluxDB - Time Series baza podataka
  influxdb:
    image: influxdb:2.7.0
    container_name: influxdb-service
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: measurements
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: adminpass123
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
      INFLUXDB_ORG: myorg
      INFLUXDB_BUCKET: measurements
      INFLUXDB_RETENTION: 0
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpass123
      DOCKER_INFLUXDB_INIT_ORG: myorg
      DOCKER_INFLUXDB_INIT_BUCKET: measurements
      DOCKER_INFLUXDB_INIT_RETENTION: 0s
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: mytoken
    volumes:
      - influxdb_data:/var/lib/influxdb2
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Key-Value baza (cache)
  redis:
    image: redis:7.2-alpine
    container_name: redis-service
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Java Spring Boot mikroservis
  measurements-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: measurements-microservice
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: influxdb-app
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: mytoken
      INFLUXDB_ORG: myorg
      INFLUXDB_BUCKET: measurements
      SERVER_PORT: 8080
    depends_on:
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/measurements/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  influxdb_data:
    driver: local
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge
