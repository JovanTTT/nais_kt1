server {
    listen 80;
    server_name localhost;

    # Limit ka upstream serverima
    upstream measurements_backend {
        server measurements-api:8080;
    }

    # API proxy
    location /api/ {
        proxy_pass http://measurements_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://measurements_backend/api/measurements/health;
        access_log off;
    }

    # Metrike
    location /metrics {
        return 403;
    }

    # Root
    location / {
        return 301 /api/measurements/health;
    }
}
