spring:
  application:
    name: influxdb-app
  redis:
    host: redis
    port: 6379
    timeout: 60000ms
    jedis:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

server:
  port: 8080
  servlet:
    context-path: /api

influxdb:
  url: http://influxdb:8086
  token: mytoken
  org: myorg
  bucket: measurements

weather:
  enabled: true
  past-days: 30        # koliko dana unazad povlačimo (satne tačke) -> ~3800 slogova
  forecast-days: 2     # koliko dana prognoze unapred
  refresh-ms: 3600000  # interval automatskog osvežavanja (1h)

logging:
  level:
    root: INFO
    com.influxdb: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
